name: CI 🎮

on:
  push:
    branches:
      - main
      - setup-engine
  pull_request: {}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Install Bevy deps + LLD linker
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev lld

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-base

      - name: Cargo check
        run: cargo check --all-targets --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Install Bevy deps + LLD linker
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev lld

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-test

      - name: Cargo test
        run: cargo test --all-targets --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: git lfs pull

      - name: Install Bevy deps + LLD linker
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev lld

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-base

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Lint the wasm32 ship target too: the artefact actually deployed to GitHub
      # Pages. The host-target gates above cannot catch a wasm-only build break,
      # and the Pages workflow never runs on a pull request, so this is the only
      # gate that validates the ship target before it reaches the live demo.
      # Tests do not link on wasm, so this lints the bin/lib (not --all-targets).
      - name: Cargo clippy (wasm ship target)
        run: cargo clippy --target wasm32-unknown-unknown --all-features -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bevy deps + LLD linker
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev lld

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-base

      - name: Check Rust docs (no broken intra-doc links)
        run: bash scripts/check_rust_docs.sh

  audit:
    name: Security advisories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Scan dependencies for known vulnerabilities
        run: bash scripts/check_security_advisories.sh

  guards:
    name: Quality guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep + shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck

      # shfmt is not in apt, so pin a release binary like actionlint below. It
      # backs the formatting half of scripts/check_shell_scripts.sh (shellcheck
      # = correctness, shfmt = style), and that guard fails loudly if it is
      # missing, so this install must stay ahead of the guard step.
      - name: Install shfmt
        env:
          SHFMT_VERSION: 3.13.1
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /tmp/shfmt
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt
          shfmt --version

      - name: Validate Pages workflow
        run: bash scripts/check_pages_workflow.sh

      - name: Validate CI workflow
        run: bash scripts/check_ci_workflow.sh

      - name: Validate scheduled audit workflow
        run: bash scripts/check_scheduled_audit_workflow.sh

      - name: Check toolchain pin
        run: bash scripts/check_toolchain_pin.sh

      - name: Check git dependencies pinned (immutable rev, not a moving branch)
        run: bash scripts/check_git_dep_pinned.sh

      - name: Check pre-commit hook mirrors CI
        run: bash scripts/check_precommit_hook.sh

      - name: Check quality-script coverage (every guard wired into aggregator + CI)
        run: bash scripts/check_quality_script_coverage.sh

      - name: Check shell scripts
        run: bash scripts/check_shell_scripts.sh

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Lint GitHub Actions workflows
        run: bash scripts/check_workflow_lint.sh

      - name: Check Rust safety (no unsafe)
        run: bash scripts/check_rust_safety.sh

      - name: Check Rust suppressions (no crate-wide unused/dead_code allow)
        run: bash scripts/check_rust_suppressions.sh

      - name: Check never-ship lints (crate-root panic-guard denies intact)
        run: bash scripts/check_never_ship_lints.sh

      - name: Check debug-output leftovers (no dbg!/print!/println! in source)
        run: bash scripts/check_debug_leftovers.sh

      - name: Check temporary-fix markers (no TODO/FIXME/HACK/XXX in source)
        run: bash scripts/check_temporary_fix_markers.sh

      - name: Check duplicate comment blocks (no comment pasted twice in a row)
        run: bash scripts/check_duplicate_comment_blocks.sh

      - name: Check speed-modifier parity (human and field drive on identical terms)
        run: bash scripts/check_speed_modifier_parity.sh

      - name: Check effect-multiplier parity (human and field share the timed-effect stack)
        run: bash scripts/check_effect_multiplier_parity.sh

      - name: Check match-over halt parity (every per-frame system stops when the match is won)
        run: bash scripts/check_match_over_halt_parity.sh

      - name: Check wreck-bounty fold (every wreck bonus is paid into both team totals)
        run: bash scripts/check_wreck_bounty_fold.sh

      - name: Check wreck-bounty breakdown (every wreck bonus is logged in both team breakdowns)
        run: bash scripts/check_wreck_bounty_breakdown.sh

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Check unused dependencies
        run: bash scripts/check_unused_dependencies.sh

      - name: Check wasm RNG backend (getrandom js feature)
        run: bash scripts/check_wasm_rng_backend.sh

      - name: Check asset paths (every loaded asset exists)
        run: bash scripts/check_asset_paths.sh
